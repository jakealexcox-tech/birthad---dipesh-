<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jennifer's Birthday Countdown 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8EC;
    --pink:#FF6FA0;
    --pink-deep:#E8447F;
    --yellow:#FFD35C;
    --sky:#6FC3FF;
    --mint:#7FE8C0;
    --plum:#43264F;
    --plum-soft:#7A5C86;
    --card-shadow: 0 10px 0 rgba(67,38,79,0.12);
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:var(--cream);
    color:var(--plum);
    font-family:'Quicksand', sans-serif;
    overflow-x:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
  }

  .bg-blob{
    position:fixed;
    border-radius:50%;
    opacity:0.35;
    filter:blur(2px);
    z-index:0;
    pointer-events:none;
  }

  header{ position:relative; z-index:2; }

  .eyebrow{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-size:0.8rem;
    color:var(--pink-deep);
    background:#fff;
    display:inline-block;
    padding:6px 18px;
    border-radius:999px;
    box-shadow:var(--card-shadow);
    margin-bottom:22px;
  }

  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(2.4rem, 7vw, 4.6rem);
    line-height:1.05;
    margin:0 0 14px;
  }

  h1 span{ color:var(--pink-deep); white-space:nowrap; }

  .subtext{
    font-size:clamp(1rem, 2vw, 1.25rem);
    color:var(--plum-soft);
    font-weight:600;
    max-width:520px;
    margin:0 auto;
  }

  .countdown{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    gap:clamp(10px, 3vw, 24px);
    flex-wrap:wrap;
    padding:44px 20px 10px;
  }

  .unit{
    background:#fff;
    border-radius:22px;
    box-shadow:var(--card-shadow);
    padding:18px clamp(14px, 3vw, 26px);
    min-width:88px;
    text-align:center;
    transform:rotate(var(--tilt));
    transition:transform .25s ease;
  }

  .unit:nth-child(1){ --tilt:-3deg; background:#FFE6EF; }
  .unit:nth-child(2){ --tilt:2deg; background:#FFF4D6; }
  .unit:nth-child(3){ --tilt:-2deg; background:#E3F6FF; }
  .unit:nth-child(4){ --tilt:3deg; background:#E4FBF1; }

  .unit:hover{ transform:rotate(0deg) translateY(-4px); }

  .unit .num{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(1.8rem, 5vw, 2.8rem);
    display:block;
    line-height:1;
    font-variant-numeric: tabular-nums;
  }

  .unit .label{
    font-weight:600;
    font-size:0.72rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--plum-soft);
  }

  .countdown-note{
    position:relative;
    z-index:2;
    color:var(--plum-soft);
    font-weight:600;
    font-size:0.9rem;
    padding:14px 20px 0;
  }

  #arrived{
    display:none;
    font-family:'Fredoka', sans-serif;
    font-size:clamp(1.6rem, 5vw, 2.4rem);
    color:var(--pink-deep);
    padding:20px;
    position:relative;
    z-index:2;
  }

  @media (prefers-reduced-motion: reduce){
    *{ scroll-behavior:auto; }
  }
</style>
</head>
<body>

<div class="bg-blob" style="width:260px;height:260px;background:var(--pink);top:-60px;left:-60px;"></div>
<div class="bg-blob" style="width:200px;height:200px;background:var(--sky);top:20%;right:-70px;"></div>
<div class="bg-blob" style="width:180px;height:180px;background:var(--yellow);bottom:10%;left:-60px;"></div>
<div class="bg-blob" style="width:220px;height:220px;background:var(--mint);bottom:-80px;right:8%;"></div>

<header>
  <span class="eyebrow">A very important event</span>
  <h1>Get ready,<br><span>Jennifer's birthday</span> is coming!</h1>
  <p class="subtext">Counting down every day, hour, minute, and second until it's officially your day to shine.</p>
</header>

<div class="countdown" id="countdown" role="timer" aria-live="polite" aria-label="Countdown to Jennifer's birthday">
  <div class="unit"><span class="num" id="days">00</span><span class="label">Days</span></div>
  <div class="unit"><span class="num" id="hours">00</span><span class="label">Hours</span></div>
  <div class="unit"><span class="num" id="minutes">00</span><span class="label">Minutes</span></div>
  <div class="unit"><span class="num" id="seconds">00</span><span class="label">Seconds</span></div>
</div>
<p class="countdown-note">until the surprise unlocks 🎂</p>
<div id="arrived">🎉 It's here! Taking you to your surprise... 🎉</div>

<script>
  // Jennifer's birthday: Monday, July 6, 2026.
  const target = new Date(2026, 6, 6, 0, 0, 0);

  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const countdownEl = document.getElementById('countdown');
  const noteEl = document.querySelector('.countdown-note');
  const arrivedEl = document.getElementById('arrived');

  function pad(n){ return String(n).padStart(2,'0'); }

  function tick(){
    const now = new Date();
    const diff = target - now;

    if(diff <= 0){
      countdownEl.style.display = 'none';
      noteEl.style.display = 'none';
      arrivedEl.style.display = 'block';
      clearInterval(timer);
      setTimeout(() => { window.location.href = 'balloons.html'; }, 1500);
      return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);
    const s = Math.floor((diff / 1000) % 60);

    daysEl.textContent = pad(d);
    hoursEl.textContent = pad(h);
    minutesEl.textContent = pad(m);
    secondsEl.textContent = pad(s);
  }

  tick();
  const timer = setInterval(tick, 1000);
</script>

</body>
</html>
